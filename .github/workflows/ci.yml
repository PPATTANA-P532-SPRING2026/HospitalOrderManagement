name: CI/CD

on:
  push:
    branches: [ main, week-2-changes ]
  pull_request:
    branches: [ main, week-2-changes ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Run tests
        run: mvn -q test
      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: target/surefire-reports/

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build fat JAR
        run: mvn -q package -DskipTests
      - name: Build Docker image
        run: docker build -t hospitalmanagementsystem .

  # ── Deploy main backend ───────────────────────────────────────────
  deploy-main:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render deploy (main)
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}

  # ── Deploy week-2-changes backend ────────────────────────────────
  deploy-week2:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/week-2-changes'
    steps:
      - name: Trigger Render deploy (week-2-changes)
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_WEEK2 }}

  # ── Deploy main frontend ──────────────────────────────────────────
  deploy-frontend-main:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages
          path: ./src/main/resources/static
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages

  # ── Deploy week-2-changes frontend ───────────────────────────────
  deploy-frontend-week2:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/week-2-changes'
    environment:
      name: github-pages-week2
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages-week2
          path: ./src/main/resources/static
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-week2
